services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  api:
    build: .
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge-base:/app/knowledge-base
      - ./rag_index:/app/rag_index
    restart: unless-stopped

volumes:
  ollama_models:
