name: Deploy GitHub Pages showcase

on:
  push:
    branches: [master]
    # Deliberately NOT "web/**" -- that also matches the actual app's own
    # source (ChatInterface.tsx, api.ts, etc.), which changes far more
    # often than the showcase page and has nothing to do with it. This
    # list is every file HomePage.tsx actually pulls in (traced via its
    # import graph), so an app-only bug fix stops re-triggering (and
    # re-cancelling, given cancel-in-progress below) a showcase deploy
    # that has nothing to show. If you touch something showcase-relevant
    # that isn't in this list, use the "Run workflow" button (workflow_dispatch)
    # instead of widening this back to a broad glob.
    paths:
      - "web/src/App.tsx"
      - "web/src/main.tsx"
      - "web/src/HomePage.tsx"
      - "web/src/StaticShowcaseSection.tsx"
      - "web/src/EvalResultsSection.tsx"
      - "web/src/PreLoader.tsx"
      - "web/src/ShinyText.tsx"
      - "web/src/ShinyText.css"
      - "web/src/ScrollFloat.tsx"
      - "web/src/ScrollFloat.css"
      - "web/src/MagicBentoGlow.tsx"
      - "web/src/SmoothScroll.tsx"
      - "web/src/ScrollReveal.tsx"
      - "web/src/TextPressure.tsx"
      - "web/src/StickyPipeline.tsx"
      - "web/src/CountUp.tsx"
      - "web/src/deviceTier.ts"
      - "web/src/index.css"
      - "web/index.html"
      - "web/vite.config.ts"
      - "web/package.json"
      - "web/package-lock.json"
      - "web/public/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: VITE_STATIC_DEMO=true npm run build
        working-directory: web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
