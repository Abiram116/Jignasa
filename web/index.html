<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <!-- viewport-fit=cover lets CSS env(safe-area-inset-*) report iOS Safari's
         actual reserved space (bottom toolbar, home indicator, notch) instead
         of always returning 0 -- needed for content not to render under it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Jignasa – a fully local, privacy-first RAG assistant powered by Ollama and FAISS" />
    <meta name="theme-color" content="#07090f" />
    <title>Jignasa · Local RAG Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Static, framework-free fallback: React replaces this the moment it
         mounts (App.tsx's PreLoader takes over from there). Without this, a
         slow-to-load JS bundle or a JS error shows a truly blank white page
         with zero indication anything is happening -- this makes sure
         there's always *something* on screen from the first paint. -->
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:#07090f;color:#8b93a8;font-family:Inter,system-ui,sans-serif;font-size:0.9rem;letter-spacing:0.02em;">
        <div style="width:32px;height:32px;border-radius:50%;border:2px solid #262d3f;border-top-color:#6366f1;animation:jignasa-spin 0.8s linear infinite;"></div>
        <span>Starting Jignasa…</span>
      </div>
    </div>
    <style>@keyframes jignasa-spin { to { transform: rotate(360deg); } }</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
