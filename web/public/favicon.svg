<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <style>
    /* Indigo reads fine on a light tab bar; on a dark one, switching to
       white keeps it crisp instead of getting visually muddy against a
       similarly dark background. The browser applies this on its own
       based on the OS/browser appearance setting -- no theme detection
       needed in the app itself, this is a single static file. */
    path { stroke: #6366f1; }
    @media (prefers-color-scheme: dark) {
      path { stroke: #ffffff; }
    }
  </style>
  <path d="M15 5 L15 13.5 C15 17.8 12.5 19.6 9.3 19.2 C7.5 19 6.3 17.8 6.7 16.2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
